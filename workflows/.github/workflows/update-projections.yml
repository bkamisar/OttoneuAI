name: Update Projections

# Runs every Monday at 8am UTC during the season.
# Also triggerable manually from the GitHub Actions tab at any time.
on:
  schedule:
    - cron: '0 8 * * 1'   # Monday 8:00 UTC = Monday 4am ET
  workflow_dispatch:        # Manual: Actions tab → "Run workflow"

# Grant the built-in GITHUB_TOKEN permission to push commits
permissions:
  contents: write

jobs:
  update-projections:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch projections from FanGraphs
        run: python scripts/update_projections.py

      # Only commits data/proj_hitting.csv and data/proj_pitching.csv.
      # Y1 / Y2 files are never touched by this workflow.
      - name: Commit updated projections (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/proj_hitting.csv data/proj_pitching.csv
          if git diff --staged --quiet; then
            echo "Projections unchanged — nothing to commit."
          else
            git commit -m "Auto-update projections $(date -u +'%Y-%m-%d')"
            git push
          fi
